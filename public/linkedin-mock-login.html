<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | LinkedIn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Fira Sans", Ubuntu, Oxygen, "Oxygen Sans", Cantarell, "Droid Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Lucida Grande", Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-[#f3f2ef] min-h-screen flex flex-col justify-between">
  <!-- Header -->
  <header class="px-6 py-5 max-w-5xl mx-auto w-full">
    <div class="flex items-center">
      <svg class="h-6 text-[#0a66c2]" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
      </svg>
    </div>
  </header>

  <!-- Main Card -->
  <main class="flex-1 flex items-center justify-center px-4">
    <div class="bg-white rounded-lg shadow-md p-6 max-w-sm w-full border border-gray-200">
      <div class="text-center mb-6">
        <h1 class="text-xl font-semibold text-gray-900">Authorize NextRoundPrep</h1>
        <p class="text-xs text-gray-500 mt-1">LinkedIn Secure Authentication</p>
      </div>

      <form id="auth-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide">Full Name</label>
          <input 
            type="text" 
            id="user-name" 
            placeholder="e.g. Suresh Kumar" 
            value="Suresh Kumar"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#0a66c2] focus:border-transparent"
            required
          >
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide">LinkedIn Email</label>
          <input 
            type="email" 
            id="user-email" 
            placeholder="e.g. suresh@linkedin.com" 
            value="suresh@linkedin.com"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#0a66c2] focus:border-transparent"
            required
          >
        </div>

        <div class="pt-2">
          <button 
            type="submit" 
            class="w-full bg-[#0a66c2] hover:bg-[#004182] text-white font-semibold py-2 px-4 rounded-full text-sm transition-all shadow"
          >
            Agree & Authorize
          </button>
        </div>
      </form>

      <div class="mt-4 border-t border-gray-200 pt-4 text-center">
        <p class="text-[11px] text-gray-500">
          By clicking Agree & Authorize, you agree to share your public LinkedIn profile and email address with NextRoundPrep.
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-5 text-center text-xs text-gray-500">
    <p>© 2026 LinkedIn Corporation</p>
  </footer>

  <script>
    document.getElementById("auth-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("user-name").value.trim();
      const email = document.getElementById("user-email").value.trim();
      
      if (window.opener) {
        window.opener.postMessage({
          type: "LINKEDIN_AUTH_SUCCESS",
          user: {
            uid: "linkedin-" + Math.random().toString(36).substr(2, 9),
            email: email,
            name: name,
            provider: "linkedin"
          }
        }, "*");
        window.close();
      } else {
        alert("Parent window not found. This authorization must be opened as a popup.");
      }
    });
  </script>
</body>
</html>
